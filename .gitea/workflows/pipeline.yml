name: LSJkash CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: python
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r requirements.txt

      - name: Run flake8
        run: flake8 server/ client/ crypto/ --max-line-length=120 --statistics

  sast:
    name: SAST (Bandit)
    runs-on: python
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r server/ client/ crypto/ -f json -o bandit-report.json || true

      - name: Display Bandit report
        run: bandit -r server/ client/ crypto/ -f screen || true

  sca:
    name: SCA (pip-audit)
    runs-on: python
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: pip-audit -r requirements.txt || true

  test:
    name: Tests (pytest)
    runs-on: python
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v || echo "No tests yet"
